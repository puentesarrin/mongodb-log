[tox]
skip_missing_interpreters = true
requires = tox>=4.21
env_list = py

[testenv]
description = run the mongolog test suite
package = wheel
wheel_build_env = .pkg
deps = coverage[toml]
set_env =
    MONGO_HOST = {env:MONGO_HOST:localhost}
    MONGO_PORT = {env:MONGO_PORT:27017}
commands =
    coverage run -m unittest discover -s tests -p "test_*.py"
    coverage xml
